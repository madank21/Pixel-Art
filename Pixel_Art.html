<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pixel Art Generator</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323:wght@400&display=swap');

  :root {
    --bg: #1a1a2e;
    --panel: #16213e;
    --card: #0f3460;
    --accent: #e94560;
    --accent2: #f5a623;
    --accent3: #7bed9f;
    --text: #eaeaea;
    --muted: #8892a4;
    --pixel-border: 3px solid var(--accent);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'VT323', monospace;
    font-size: 18px;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Scanline overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0px,
      transparent 2px,
      rgba(0,0,0,0.08) 2px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  header {
    text-align: center;
    padding: 36px 20px 16px;
    position: relative;
  }
  header h1 {
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(14px, 3vw, 22px);
    color: var(--accent);
    text-shadow: 4px 4px 0 #7b1a2a, 0 0 30px rgba(233,69,96,0.5);
    letter-spacing: 2px;
    line-height: 1.6;
  }

  header p {
    color: var(--accent3);
    font-size: 20px;
    margin-top: 10px;
    text-shadow: 0 0 12px rgba(123,237,159,0.4);
  }

  .blink {
    animation: blink 1s step-end infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }

  main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 20px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
  }

  @media (max-width: 700px) {
    main { grid-template-columns: 1fr; }
  }
 .panel {
    background: var(--panel);
    border: 3px solid var(--card);
    padding: 20px;
    position: relative;
    image-rendering: pixelated;
  }

  .panel::before {
    content: attr(data-label);
    position: absolute;
    top: -14px;
    left: 14px;
    background: var(--accent);
    color: #fff;
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    padding: 3px 10px;
    letter-spacing: 1px;
  }

  .drop-zone {
    border: 3px dashed var(--muted);
    padding: 40px 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
    min-height: 200px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
  }

.drop-zone:hover, .drop-zone.drag-over {
    border-color: var(--accent);
    background: rgba(233,69,96,0.05);
    box-shadow: 0 0 20px rgba(233,69,96,0.2) inset;
  }

  .drop-zone .icon {
    font-size: 52px;
    display: block;
    image-rendering: pixelated;
  }

  .drop-zone span {
    color: var(--muted);
    font-size: 20px;
  }

  .drop-zone strong {
    color: var(--accent2);
  }

  input[type="file"] {
    display: none;
  }
   /* Preview */
  .preview-wrap {
    display: none;
    flex-direction: column;
    gap: 12px;
  }

  .preview-wrap.visible { display: flex; }

  .preview-wrap img {
    width: 100%;
    max-height: 280px;
    object-fit: contain;
    image-rendering: pixelated;
    border: 2px solid var(--card);
  }

  /* Controls */
  .controls {
    display: flex;
    flex-direction: column;
    gap: 14px;
    margin-top: 4px;
  }

  .control-row {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .control-row label {
    color: var(--accent2);
    font-size: 18px;
    min-width: 110px;
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
  }

  input[type="range"] {
    flex: 1;
    accent-color: var(--accent);
    cursor: pointer;
    min-width: 80px;
  }

  .val-badge {
    background: var(--card);
    color: var(--accent3);
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    padding: 3px 8px;
    min-width: 42px;
    text-align: center;
  }

  select {
    background: var(--card);
    color: var(--text);
    border: 2px solid var(--muted);
    font-family: 'VT323', monospace;
    font-size: 18px;
    padding: 4px 10px;
    cursor: pointer;
    flex: 1;
    outline: none;
  }

  select:focus { border-color: var(--accent); }

  .btn-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-top: 6px;
  }

  button {
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    padding: 10px 18px;
    border: none;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: transform 0.08s, box-shadow 0.08s;
    position: relative;
    outline: none;
  }

  button:active { transform: translate(2px,2px); box-shadow: none !important; }

  .btn-primary {
    background: var(--accent);
    color: #fff;
    box-shadow: 4px 4px 0 #7b1a2a;
  }
  .btn-primary:hover { box-shadow: 6px 6px 0 #7b1a2a; transform: translate(-1px,-1px); }

  .btn-secondary {
    background: var(--card);
    color: var(--accent3);
    box-shadow: 4px 4px 0 #062040;
  }
  .btn-secondary:hover { box-shadow: 6px 6px 0 #062040; transform: translate(-1px,-1px); }

  .btn-accent2 {
    background: var(--accent2);
    color: #1a1a2e;
    box-shadow: 4px 4px 0 #7b5000;
  }
  .btn-accent2:hover { box-shadow: 6px 6px 0 #7b5000; transform: translate(-1px,-1px); }

  button:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    transform: none !important;
  }

  /* Output */
  .output-panel {
    grid-column: 1 / -1;
    display: none;
  }
  .output-panel.visible { display: block; }

  .canvas-wrap {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    gap: 24px;
    flex-wrap: wrap;
    padding: 12px 0;
  }

  .canvas-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .canvas-item .clabel {
    font-family: 'Press Start 2P', monospace;
    font-size: 8px;
    color: var(--muted);
    text-transform: uppercase;
  }

  canvas {
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    border: 3px solid var(--card);
    max-width: 100%;
  }

  .progress-wrap {
    display: none;
    align-items: center;
    gap: 14px;
    padding: 14px 0;
  }
  .progress-wrap.visible { display: flex; }

  .progress-bar-outer {
    flex: 1;
    height: 16px;
    background: var(--card);
    border: 2px solid var(--muted);
    overflow: hidden;
  }

  .progress-bar-inner {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    width: 0%;
    transition: width 0.1s;
    image-rendering: pixelated;
  }

  .progress-label {
    font-family: 'Press Start 2P', monospace;
    font-size: 8px;
    color: var(--accent3);
    min-width: 80px;
    text-align: right;
  }

  /* Palette preview */
  .palette-strip {
    display: flex;
    flex-wrap: wrap;
    gap: 3px;
    margin-top: 4px;
  }

  .palette-swatch {
    width: 18px;
    height: 18px;
    border: 1px solid rgba(255,255,255,0.15);
    flex-shrink: 0;
  }

  /* Stat bar */
  .stats {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    padding: 10px 0 4px;
    border-top: 2px solid var(--card);
    margin-top: 10px;
  }

  .stat {
    font-family: 'Press Start 2P', monospace;
    font-size: 8px;
    color: var(--muted);
  }
  .stat span { color: var(--accent2); }

  /* corner decorations */
  .panel .corner {
    position: absolute;
    width: 10px;
    height: 10px;
    background: var(--accent);
  }
  .panel .corner.tl { top: 0; left: 0; }
  .panel .corner.tr { top: 0; right: 0; }
  .panel .corner.bl { bottom: 0; left: 0; }
  .panel .corner.br { bottom: 0; right: 0; }

  footer {
    text-align: center;
    padding: 30px;
    color: var(--muted);
    font-size: 16px;
  }

  footer strong { color: var(--accent); }

  /* pixel grid overlay toggle */
  canvas.grid-on {
    outline: none;
  }
  footer strongs { color: var(--text); }

  canvas.grid-on {
    outline: none;
  }

  .toggle-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .toggle-label {
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    color: var(--muted);
    cursor: pointer;
  }

  input[type="checkbox"] {
    accent-color: var(--accent);
    width: 16px;
    height: 16px;
    cursor: pointer;
  }
</style>
</head>
<body>

<header>
  <h1>⬛ PIXEL ART<br>GENERATOR</h1>
  <p>Upload any photo → get retro pixel art <span class="blink">█</span></p>
</header>

<main>
  <!-- INPUT PANEL -->
  <div class="panel" data-label="INPUT IMAGE">
    <div class="corner tl"></div><div class="corner tr"></div>
    <div class="corner bl"></div><div class="corner br"></div>

    <div class="drop-zone" id="dropZone">
      <span class="icon">🖼️</span>
      <span>Drop your photo here<br>or <strong>click to upload</strong></span>
      <span style="font-size:14px;color:var(--muted)">JPG · PNG · WEBP · GIF</span>
    </div>
    <input type="file" id="fileInput" accept="image/*">

    <div class="preview-wrap" id="previewWrap">
      <img id="previewImg" src="" alt="preview">
      <div class="stats" id="imgStats">
        <div class="stat">W: <span id="sW">-</span>px</div>
        <div class="stat">H: <span id="sH">-</span>px</div>
        <div class="stat">FILE: <span id="sFile">-</span></div>
      </div>
    </div>
  </div>

  <!-- SETTINGS PANEL -->
  <div class="panel" data-label="SETTINGS">
    <div class="corner tl"></div><div class="corner tr"></div>
    <div class="corner bl"></div><div class="corner br"></div>

    <div class="controls">

      <div class="control-row">
        <label>PIXEL SIZE</label>
        <input type="range" id="pixelSize" min="2" max="24" value="8" step="1">
        <div class="val-badge" id="pixelSizeVal">8</div>
      </div>

      <div class="control-row">
        <label>PALETTE</label>
        <select id="paletteSelect">
          <option value="none">None (Full Color)</option>
          <option value="gameboy">Game Boy (4 colors)</option>
          <option value="nes">NES (54 colors)</option>
          <option value="c64">C64 (16 colors)</option>
          <option value="cga">CGA (4 colors)</option>
          <option value="pico8" selected>PICO-8 (16 colors)</option>
          <option value="mono">Monochrome</option>
          <option value="sepia">Sepia</option>
          <option value="pastel">Pastel Dream</option>
          <option value="neon">Neon City</option>
        </select>
      </div>

      <div class="control-row">
        <label>OUTPUT SIZE</label>
        <select id="outputSize">
          <option value="1">1x (native pixel size)</option>
          <option value="2">2x</option>
          <option value="4" selected>4x</option>
          <option value="8">8x</option>
        </select>
      </div>

<div class="control-row">
        <label>DITHERING</label>
        <select id="dithering">
          <option value="none">None</option>
          <option value="floyd" selected>Floyd-Steinberg</option>
          <option value="ordered">Ordered (Bayer)</option>
        </select>
      </div>

      <div class="control-row">
        <label>CONTRAST</label>
        <input type="range" id="contrast" min="-100" max="100" value="10" step="5">
        <div class="val-badge" id="contrastVal">10</div>
      </div>

      <div class="control-row">
        <label>SATURATION</label>
        <input type="range" id="saturation" min="0" max="200" value="110" step="5">
        <div class="val-badge" id="saturationVal">110</div>
      </div>

      <div class="toggle-row">
        <input type="checkbox" id="showGrid">
        <label class="toggle-label" for="showGrid">SHOW PIXEL GRID</label>
        <input type="checkbox" id="showOutline" style="margin-left:14px">
        <label class="toggle-label" for="showOutline">DARK OUTLINE</label>
      </div>

      <div id="palettePreview" class="palette-strip"></div>

      <div class="btn-row">
        <button class="btn-primary" id="generateBtn" disabled>▶ GENERATE</button>
        <button class="btn-secondary" id="resetBtn">↺ RESET</button>
      </div>

    </div>
  </div>

  <!-- OUTPUT PANEL -->
  <div class="panel output-panel" id="outputPanel" data-label="PIXEL ART OUTPUT">
    <div class="corner tl"></div><div class="corner tr"></div>
    <div class="corner bl"></div><div class="corner br"></div>

    <div class="progress-wrap" id="progressWrap">
      <div class="progress-bar-outer">
        <div class="progress-bar-inner" id="progressBar"></div>
      </div>
      <div class="progress-label" id="progressLabel">0%</div>
    </div>

    <div class="canvas-wrap">
      <div class="canvas-item">
        <div class="clabel">ORIGINAL</div>
        <canvas id="originalCanvas"></canvas>
      </div>
      <div class="canvas-item">
        <div class="clabel">PIXEL ART</div>
        <canvas id="outputCanvas"></canvas>
      </div>
    </div>

    <div class="btn-row" style="justify-content:center; margin-top:16px;">
      <button class="btn-accent2" id="downloadBtn">⬇ DOWNLOAD PNG</button>
      <button class="btn-secondary" id="downloadSmallBtn">⬇ DOWNLOAD SMALL</button>
    </div>
  </div>
</main>

<!-- hidden processing canvas -->
<canvas id="workCanvas" style="display:none"></canvas>

<footer>
  Made with <strong>♥</strong> · by <strongs>Madan</strongs>,  Upload any photo, get pixel art magic
</footer>




<script>
// ─── PALETTES ────────────────────────────────────────────────────────────────
const PALETTES = {
  none: null,
  gameboy: [[15,56,15],[48,98,48],[139,172,15],[155,188,15]],
  c64: [[0,0,0],[255,255,255],[136,0,0],[170,255,238],[204,68,204],[0,204,85],[0,0,170],[238,238,119],[221,136,85],[102,68,0],[255,119,119],[51,51,51],[119,119,119],[170,255,102],[0,136,255],[187,187,187]],
  cga: [[0,0,0],[85,255,255],[255,85,255],[255,255,255]],
  pico8: [[0,0,0],[29,43,83],[126,37,83],[0,135,81],[171,82,54],[95,87,79],[194,195,199],[255,241,232],[255,0,77],[255,163,0],[255,236,39],[0,228,54],[41,173,255],[131,118,156],[255,119,168],[255,204,170]],
  mono: Array.from({length:16},(_,i)=>{const v=Math.round(i*17);return[v,v,v];}),
  sepia: [[20,10,5],[60,35,15],[110,70,35],[160,110,60],[200,160,100],[240,210,160],[255,240,210]],
  pastel: [[255,179,193],[255,211,182],[255,245,182],[182,255,193],[182,230,255],[211,182,255],[255,182,255],[240,240,240]],
  neon: [[0,0,0],[0,255,200],[255,0,128],[0,128,255],[255,200,0],[128,0,255],[255,128,0],[255,255,255]],
  nes: [[84,84,84],[0,30,116],[8,16,144],[48,0,136],[68,0,100],[92,0,48],[84,4,0],[60,24,0],[32,42,0],[8,58,0],[0,64,0],[0,60,0],[0,50,60],[0,0,0],[152,150,152],[8,76,196],[48,50,236],[92,30,228],[136,20,176],[160,20,100],[152,34,32],[120,60,0],[84,90,0],[40,114,0],[8,124,0],[0,118,40],[0,102,120],[0,0,0],[236,238,236],[76,154,236],[120,124,236],[176,98,236],[228,84,236],[236,88,180],[236,106,100],[212,136,32],[160,170,0],[116,196,0],[76,208,32],[56,204,108],[56,180,204],[60,60,60],[236,238,236],[168,204,236],[188,188,236],[212,178,236],[236,174,236],[236,174,212],[236,180,176],[228,196,144],[204,210,120],[180,222,120],[168,226,144],[152,226,180],[160,214,228],[160,162,160]]
};

// ─── PALETTE PREVIEW ─────────────────────────────────────────────────────────
function renderPalettePreview(name) {
  const strip = document.getElementById('palettePreview');
  strip.innerHTML = '';
  const pal = PALETTES[name];
  if (!pal) return;
  pal.forEach(([r,g,b]) => {
    const s = document.createElement('div');
    s.className = 'palette-swatch';
    s.style.background = `rgb(${r},${g},${b})`;
    strip.appendChild(s);
  });
}
document.getElementById('paletteSelect').addEventListener('change', e => renderPalettePreview(e.target.value));
renderPalettePreview('pico8');

// ─── RANGE DISPLAYS ──────────────────────────────────────────────────────────
['pixelSize','contrast','saturation'].forEach(id => {
  const el = document.getElementById(id);
  const badge = document.getElementById(id+'Val');
  el.addEventListener('input', () => badge.textContent = el.value);
});

// ─── FILE UPLOAD ─────────────────────────────────────────────────────────────
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
let loadedImage = null;

dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', () => { if (fileInput.files[0]) loadFile(fileInput.files[0]); });

function loadFile(file) {
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      loadedImage = img;
      const preview = document.getElementById('previewImg');
      preview.src = ev.target.result;
      document.getElementById('previewWrap').classList.add('visible');
      document.getElementById('sW').textContent = img.width;
      document.getElementById('sH').textContent = img.height;
      document.getElementById('sFile').textContent = (file.size/1024).toFixed(1)+'KB';
      document.getElementById('generateBtn').disabled = false;
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

// ─── NEAREST COLOR ───────────────────────────────────────────────────────────
function nearestColor(r,g,b,palette) {
  let best=null, bestDist=Infinity;
  for (const [pr,pg,pb] of palette) {
    const d=(r-pr)**2+(g-pg)**2+(b-pb)**2;
    if (d<bestDist){bestDist=d;best=[pr,pg,pb];}
  }
  return best;
}

// ─── ADJUST PIXEL ────────────────────────────────────────────────────────────
function adjustContrast(val, contrast) {
  const f = (259*(contrast+255))/(255*(259-contrast));
  return Math.max(0,Math.min(255, f*(val-128)+128));
}

function adjustSaturation(r,g,b,saturation) {
  const sat = saturation/100;
  const gray = 0.299*r + 0.587*g + 0.114*b;
  return [
    Math.max(0,Math.min(255, gray + sat*(r-gray))),
    Math.max(0,Math.min(255, gray + sat*(g-gray))),
    Math.max(0,Math.min(255, gray + sat*(b-gray)))
  ];
}

// ─── FLOYD-STEINBERG DITHER ───────────────────────────────────────────────────
function floydSteinberg(data, w, h, palette) {
  for (let y=0;y<h;y++) {
    for (let x=0;x<w;x++) {
      const i=(y*w+x)*4;
      const or=data[i],og=data[i+1],ob=data[i+2];
      const [nr,ng,nb]=nearestColor(or,og,ob,palette);
      data[i]=nr;data[i+1]=ng;data[i+2]=nb;
      const er=or-nr,eg=og-ng,eb=ob-nb;
      const spread=[[x+1,y,7/16],[x-1,y+1,3/16],[x,y+1,5/16],[x+1,y+1,1/16]];
      for (const [sx,sy,f] of spread) {
        if (sx>=0&&sx<w&&sy>=0&&sy<h){
          const si=(sy*w+sx)*4;
          data[si]=Math.max(0,Math.min(255,data[si]+er*f));
          data[si+1]=Math.max(0,Math.min(255,data[si+1]+eg*f));
          data[si+2]=Math.max(0,Math.min(255,data[si+2]+eb*f));
        }
      }
    }
  }
}
