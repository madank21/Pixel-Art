<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pixel Art Generator</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323:wght@400&display=swap');

  :root {
    --bg: #1a1a2e;
    --panel: #16213e;
    --card: #0f3460;
    --accent: #e94560;
    --accent2: #f5a623;
    --accent3: #7bed9f;
    --text: #eaeaea;
    --muted: #8892a4;
    --pixel-border: 3px solid var(--accent);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'VT323', monospace;
    font-size: 18px;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Scanline overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0px,
      transparent 2px,
      rgba(0,0,0,0.08) 2px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  header {
    text-align: center;
    padding: 36px 20px 16px;
    position: relative;
  }
  header h1 {
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(14px, 3vw, 22px);
    color: var(--accent);
    text-shadow: 4px 4px 0 #7b1a2a, 0 0 30px rgba(233,69,96,0.5);
    letter-spacing: 2px;
    line-height: 1.6;
  }

  header p {
    color: var(--accent3);
    font-size: 20px;
    margin-top: 10px;
    text-shadow: 0 0 12px rgba(123,237,159,0.4);
  }

  .blink {
    animation: blink 1s step-end infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }

  main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 20px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
  }

  @media (max-width: 700px) {
    main { grid-template-columns: 1fr; }
  }
 .panel {
    background: var(--panel);
    border: 3px solid var(--card);
    padding: 20px;
    position: relative;
    image-rendering: pixelated;
  }

  .panel::before {
    content: attr(data-label);
    position: absolute;
    top: -14px;
    left: 14px;
    background: var(--accent);
    color: #fff;
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    padding: 3px 10px;
    letter-spacing: 1px;
  }

  .drop-zone {
    border: 3px dashed var(--muted);
    padding: 40px 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
    min-height: 200px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
  }

.drop-zone:hover, .drop-zone.drag-over {
    border-color: var(--accent);
    background: rgba(233,69,96,0.05);
    box-shadow: 0 0 20px rgba(233,69,96,0.2) inset;
  }

  .drop-zone .icon {
    font-size: 52px;
    display: block;
    image-rendering: pixelated;
  }

  .drop-zone span {
    color: var(--muted);
    font-size: 20px;
  }

  .drop-zone strong {
    color: var(--accent2);
  }

  input[type="file"] {
    display: none;
  }
   /* Preview */
  .preview-wrap {
    display: none;
    flex-direction: column;
    gap: 12px;
  }

  .preview-wrap.visible { display: flex; }

  .preview-wrap img {
    width: 100%;
    max-height: 280px;
    object-fit: contain;
    image-rendering: pixelated;
    border: 2px solid var(--card);
  }

  /* Controls */
  .controls {
    display: flex;
    flex-direction: column;
    gap: 14px;
    margin-top: 4px;
  }

  .control-row {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .control-row label {
    color: var(--accent2);
    font-size: 18px;
    min-width: 110px;
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
  }

  input[type="range"] {
    flex: 1;
    accent-color: var(--accent);
    cursor: pointer;
    min-width: 80px;
  }

  .val-badge {
    background: var(--card);
    color: var(--accent3);
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    padding: 3px 8px;
    min-width: 42px;
    text-align: center;
  }

  select {
    background: var(--card);
    color: var(--text);
    border: 2px solid var(--muted);
    font-family: 'VT323', monospace;
    font-size: 18px;
    padding: 4px 10px;
    cursor: pointer;
    flex: 1;
    outline: none;
  }

  select:focus { border-color: var(--accent); }

  .btn-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-top: 6px;
  }

  button {
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    padding: 10px 18px;
    border: none;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: transform 0.08s, box-shadow 0.08s;
    position: relative;
    outline: none;
  }

  button:active { transform: translate(2px,2px); box-shadow: none !important; }

  .btn-primary {
    background: var(--accent);
    color: #fff;
    box-shadow: 4px 4px 0 #7b1a2a;
  }
  .btn-primary:hover { box-shadow: 6px 6px 0 #7b1a2a; transform: translate(-1px,-1px); }

  .btn-secondary {
    background: var(--card);
    color: var(--accent3);
    box-shadow: 4px 4px 0 #062040;
  }
  .btn-secondary:hover { box-shadow: 6px 6px 0 #062040; transform: translate(-1px,-1px); }

  .btn-accent2 {
    background: var(--accent2);
    color: #1a1a2e;
    box-shadow: 4px 4px 0 #7b5000;
  }
  .btn-accent2:hover { box-shadow: 6px 6px 0 #7b5000; transform: translate(-1px,-1px); }

  button:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    transform: none !important;
  }

  /* Output */
  .output-panel {
    grid-column: 1 / -1;
    display: none;
  }
  .output-panel.visible { display: block; }

  .canvas-wrap {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    gap: 24px;
    flex-wrap: wrap;
    padding: 12px 0;
  }

  .canvas-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .canvas-item .clabel {
    font-family: 'Press Start 2P', monospace;
    font-size: 8px;
    color: var(--muted);
    text-transform: uppercase;
  }

  canvas {
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    border: 3px solid var(--card);
    max-width: 100%;
  }

  .progress-wrap {
    display: none;
    align-items: center;
    gap: 14px;
    padding: 14px 0;
  }
  .progress-wrap.visible { display: flex; }

  .progress-bar-outer {
    flex: 1;
    height: 16px;
    background: var(--card);
    border: 2px solid var(--muted);
    overflow: hidden;
  }

  .progress-bar-inner {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    width: 0%;
    transition: width 0.1s;
    image-rendering: pixelated;
  }

  .progress-label {
    font-family: 'Press Start 2P', monospace;
    font-size: 8px;
    color: var(--accent3);
    min-width: 80px;
    text-align: right;
  }
